# MySQL for NeuroScan AI backend (same as web `.env.example`).
# From repo root: docker compose up -d
# Then copy `backend/.env.example` → `backend/.env` and set MYSQL_HOST=127.0.0.1

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: tumer_db
    ports:
      - "3306:3306"
    volumes:
      - neuroscan_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4

volumes:
  neuroscan_mysql_data:
